<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-color: #f99e1a; /* Overwatch Gold */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: grid;
            grid-template-columns: 3;
            margin: 0;

        }

        .game-card {
            background-color: var(--card-bg);
            width: 350px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            border: 1px solid #444;
        }

        .game-card:hover {
            transform: translateY(-5px);
        }

        .thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .content {
            padding: 20px;
        }

        .title {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .description {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.4;
            margin-bottom: 20px;
            height: 40px;
            overflow: hidden;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-top: 1px solid #444;
            padding-top: 15px;
        }

        .meta-item b {
            color: var(--accent-color);
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .meta-item span {
            color: var(--text-main);
        }

        .btn {
            display: block;
            text-align: center;
            background-color: var(--accent-color);
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .profile-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-decoration: none;
        }

        .profile-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="min-h-screen grid grid-cols-3 gap-10  bg-gray-900 selection:bg-indigo-500 selection:text-white antialiased font-sans p-6">
    <script src="script.js"></script>
</body>
</html>
