<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialFlow | Post Creation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <style>
      body {
        background: radial-gradient(
          circle at top left,
          #fffbeb,
          #fef3c7,
          #fde68a
        );
        min-height: 100vh;
      }
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body class="p-5 md:p-10 font-sans text-amber-900">
    <header class="text-center mb-12 animate__animated animate__fadeInDown">
      <h1 class="text-4xl font-black tracking-tight text-amber-800">
        Social<span class="text-amber-600">Flow</span>
      </h1>
      <p class="text-amber-700/60 font-medium">
        Share your moments with the world
      </p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
      <section class="lg:col-span-4 animate__animated animate__fadeInLeft">
        <div class="glass p-8 rounded-3xl shadow-2xl border-t border-white">
          <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
            <span>✨</span> Create New Post
          </h2>
          <form id="postForm" class="space-y-4">
            <div>
              <label class="block text-sm font-bold mb-1 ml-2"
                >Profile Image URL</label
              >
              <input
                type="text"
                id="dp"
                placeholder="https://..."
                class="w-full bg-white/50 border-2 border-amber-200 rounded-2xl px-4 py-3 outline-none focus:border-amber-500 transition-all shadow-sm"
              />
            </div>

            <div>
              <label class="block text-sm font-bold mb-1 ml-2">Username</label>
              <input
                type="text"
                id="name"
                placeholder="@username"
                class="w-full bg-white/50 border-2 border-amber-200 rounded-2xl px-4 py-3 outline-none focus:border-amber-500 transition-all shadow-sm"
              />
            </div>

            <div>
              <label class="block text-sm font-bold mb-1 ml-2"
                >Post Image URL</label
              >
              <input
                type="url"
                id="post"
                placeholder="Paste image link..."
                class="w-full bg-white/50 border-2 border-amber-200 rounded-2xl px-4 py-3 outline-none focus:border-amber-500 transition-all shadow-sm"
              />
            </div>

            <div>
              <label class="block text-sm font-bold mb-1 ml-2">Caption</label>
              <textarea
                id="caption"
                rows="3"
                placeholder="Tell a story..."
                class="w-full bg-white/50 border-2 border-amber-200 rounded-2xl px-4 py-3 outline-none focus:border-amber-500 transition-all shadow-sm resize-none"
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-amber-200 transform active:scale-95 transition-all cursor-pointer"
            >
              PUBLISH POST
            </button>
          </form>
        </div>
      </section>

      <section class="lg:col-span-8">
        <div
          id="postsContainer"
          class="grid grid-cols-1 md:grid-cols-2 gap-6 animate__animated animate__fadeInUp"
        >
          <div
            class="group glass rounded-[2rem] overflow-hidden shadow-xl border border-white/50 transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl"
          >
            <div class="flex items-center gap-3 p-4 bg-white/40">
              <img
                src="https://img.freepik.com/free-photo/closeup-scarlet-macaw-from-side-view-scarlet-macaw-closeup-head_488145-3540.jpg?w=740"
                class="w-12 h-12 rounded-full border-2 border-amber-400 object-cover shadow-md"
                alt="avatar"
              />
              <div>
                <h3 class="font-bold text-amber-900 leading-none">
                  NatureExplorer
                </h3>
                <span class="text-xs font-semibold text-amber-700/50"
                  >2 hours ago</span
                >
              </div>
            </div>

            <div class="relative overflow-hidden aspect-square">
              <img
                src="https://i.pinimg.com/736x/4d/ea/53/4dea53f9e02d347e88949d29ffa72ace.jpg"
                class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                alt="post"
              />
              <div
                class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"
              >
                <span class="text-white text-4xl">❤️</span>
              </div>
            </div>

            <div class="p-5">
              <p class="text-amber-900/80 leading-relaxed italic">
                "The beauty of the wild is unmatched. Finding peace in the
                green."
              </p>
              <div class="mt-4 flex gap-4 text-amber-800/40 text-sm">
                <span><b>2.4k</b> Likes</span>
                <span><b>128</b> Comments</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div
      id="toast"
      class="fixed bottom-5 right-5 hidden animate__animated animate__bounceIn"
    >
      <div
        class="bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl font-bold"
      >
        Post Published Successfully! 🚀
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      // Adding a small click interaction logic for the button
      const btn = document.querySelector("button");
      const toast = document.getElementById("toast");

      btn.addEventListener("click", (e) => {
        e.preventDefault();
        toast.classList.remove("hidden");
        setTimeout(() => {
          toast.classList.add("animate__bounceOut");
          setTimeout(() => {
            toast.classList.add("hidden");
            toast.classList.remove("animate__bounceOut");
          }, 1000);
        }, 3000);
      });
    </script>
  </body>
</html>
